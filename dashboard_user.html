        <!-- Main Content -->
        <div class="container mt-4">
            <h2 id="home">Dashboard Pelanggan</h2>

                <div class="col-md-6">
                    <div class="card bg-info text-white mb-3">
                        <div class="card-body">
                            <h5 class="card-title">Status Donor Selanjutnya</h5>
                            <p id="countdown"></p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card bg-success text-white mb-3">
                        <div class="card-body">

            <h3 id="stok">Stok Darah</h3>
            <canvas id="bloodStockChart"></canvas>
            
            <h3 id="faq">FAQ</h3>
            <div class="accordion" id="faqAccordion">
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#faq1">
                            Apa persiapan sebelum donor darah?
                        </button>

                    <div id="faq1" class="accordion-collapse collapse" data-bs-parent="#faqAccordion">

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Countdown Timer
        function startCountdown() {
            var countDownDate = new Date("Apr 10, 2025 00:00:00").getTime();
            var x = setInterval(function() {
                var now = new Date().getTime();
                var distance = countDownDate - now;
                var days = Math.floor(distance / (1000 * 60 * 60 * 24));
                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById("countdown").innerHTML = "Siap untuk donor lagi!";
                } else {
                    document.getElementById("countdown").innerHTML = days + " hari lagi";
                }
            }, 1000);
        }
        startCountdown();
        
        // Blood Stock Chart
        var ctx = document.getElementById("bloodStockChart").getContext("2d");
        var bloodStockChart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: ["A", "B", "AB", "O"],
                datasets: [{
                    label: "Jumlah Kantong",
                    data: [100, 80, 60, 90],
                    backgroundColor: ["red", "blue", "green", "orange"]
                }]
            }
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
